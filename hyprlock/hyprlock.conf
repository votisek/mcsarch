auth {
    fingerprint:enabled = true
}

general { 
    no_fade_in = false
    grace = 0
    disable_loading = true
    ignore_empty_input = true
}

background { # background
    monitor =
    path = screenshot
    #path = ~/Pictures/Wallpaper/forest.jpg
    color = rgba(10, 12, 10, 1.0)
    blur_passes = 3
    blur_size = 3
    noise = 0.015
    contrast = 0.8
    brightness = 0.7
}

label { # time
    monitor =
    text = $TIME
    color = rgba(216, 222, 233, 0.70)
    font_size = 110
    font_family = SF Pro Rounded Semi-Bold
    outline_thickness = 5
    position = 0, 280
    halign = center
    valign = center
}

label { # date
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d. %B")"
    color = rgba(216, 222, 233, 0.70)
    font_size = 23
    font_family = SF Pro Rounded Semi-Bold
    position = 0, 375
    halign = center
    valign = center
}

input-field { # password input
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.35
    dots_center = true
    outer_color = rgba(255, 255, 255, 0)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(255, 255, 255)
    fade_on_empty = true
    rounding = -1
    
    check_color = rgb(204, 136, 34)
    fail_color = rgb(255, 85, 85)
    
    placeholder_text = <span foreground="##ffffff66">ґ░АЭ  Touch ID or Password</span>
    
    position = 0, -120
    halign = center
    valign = center
}

shape { # card
    monitor =
    size = 550, 150
    color = rgba(255, 255, 255, 0.05)
    rounding = 20
    border_size = 1
    border_color = rgba(255, 255, 255, 0.1)
    position = 0, 50
    halign = center
    valign = bottom
}

image { # coverart
    monitor =
    path = /tmp/coverArt.png
    size = 120
    rounding = 20
    border_size = 1
    border_color = rgba(255, 255, 255, 0.1)
    position = -200, 65
    halign = center
    valign = bottom
}

label { #record
    monitor =
    text = cmd[update:500] bash -c 'echo "$(playerctl metadata title || echo "No music playing")" | sed -E "s/^(.{20}).+/\\1.../"'
    color = rgba(255, 255, 255, 0.9)
    font_size = 25
    font_family = Inter
    position = 70, 150
    halign = center
    valign = bottom
    max_length = 25
}

label { # artist
    monitor =
    text = cmd[update:1000] echo "$(playerctl metadata artist || echo '')"
    color = rgba(255, 255, 255, 0.5)
    font_size = 12
    font_family = Inter
    position = 70, 130       
    halign = center
    valign = bottom
    max_length = 40
}

shape { # separator
    monitor = 
    size = 390, 5
    position = 70, 120
    halign = center
    valign = bottom
    color = rgba(255, 255, 255, 0.24)
    rounding = 50
}

label { # pause button
    monitor =
    text = cmd[update:100] if [ "$(playerctl status 2>/dev/null)" = "Playing" ]; then echo "тАП яБМ тАП"; else echo "тАП яБЛ тАП"; fi
    color = rgba(255, 255, 255, 0.3)
    width = 200
    height = 200
    text_align = center
    font_size = 40
    font_family = Font Awesome 6 Free Solid 
    
    position = 70, 50
    halign = center
    valign = bottom
    onclick = playerctl play-pause
}

label { # previous
    monitor =
    text = тАО яБК тАО
    color = rgba(255, 255, 255, 0.3)
    width = 200
    height = 200
    text-align = center
    font_size = 30
    font_family = Font Awesome 6 Free Solid
    
    position = 0, 60
    halign = center
    valign = bottom
    onclick = playerctl previous
}

label { # next
    monitor =
    text = тАО яБО тАО
    color = rgba(255, 255, 255, 0.3)
    width = 200
    height = 200
    text-align = center
    font_size = 30
    font_family = Font Awesome 6 Free Solid
    
    position = 125, 60
    halign = center
    valign = bottom
    onclick = playerctl next
}

label { # shuffle
    monitor =
    text = тАО яБ┤ тАО
    color = rgba(255, 255, 255, 0.3)
    width = 200
    height = 200
    text-align = center
    font_size = 20
    font_family = Font Awesome 6 Free Solid
    
    position = -70, 70
    halign = center
    valign = bottom
    onclick = playerctl shuffle
}

label { # loop
    monitor =
    text = тАО яНж тАО
    color = rgba(255, 255, 255, 0.3)
    width = 200
    height = 200
    text-align = center
    font_size = 20
    font_family = Font Awesome 6 Free Solid 
    
    position = 200, 70
    halign = center
    valign = bottom
    onclick = playerctl shuffle
}

label { # battery
    monitor =
    text = cmd[update:1000] echo "ґ░Б╣ $(cat /sys/class/power_supply/BAT0/capacity)%"
    color = rgba(255, 255, 255, 0.4)
    font_size = 12
    font_family = Inter, Nerd Font
    position = -30, 30
    halign = right
    valign = bottom
}
