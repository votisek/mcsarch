# Configuration made using luvvlyjude's existing configuration
### OPTIONS ###

gfx-api = "Vulkan"

idle.minutes = 10
on-idle = [ 
    { type = "exec", exec = { prog = "hyprlock", privileged = false } }
]

workspace-display-order = "sorted"

fallback-output-mode = "focus"

### OUTPUT ###

[[outputs]]
name = "main"
x = 0
y = 0
vrr = { mode = "always", cursor-hz = "none" }

### INPUT ###

use-hardware-cursor = true
focus-follows-mouse = true
middle-click-paste = false
repeat-rate = { rate = 50, delay = 200 }

[[inputs]]
match.is-pointer = true
accel-profile = "flat"
accel-speed = 1
natural-scrolling = false

### WINDOW RULES ###

[[windows]]
name = "waywall"
match.app-id = "waywall"
action = { type = "move-to-workspace", name = "5" }
auto-focus = false

### KEYBINDS ###

[shortcuts]
## Workspaces

logo-1          = { type = "show-workspace", name = "1", output.name = "main" }
logo-2          = { type = "show-workspace", name = "2", output.name = "main" }
logo-3          = { type = "show-workspace", name = "3", output.name = "main" }
logo-4          = { type = "show-workspace", name = "4", output.name = "main" }
logo-5          = { type = "show-workspace", name = "5", output.name = "main" }
logo-6          = { type = "show-workspace", name = "6", output.name = "main" }
logo-7          = { type = "show-workspace", name = "7", output.name = "main" }
logo-8          = { type = "show-workspace", name = "8", output.name = "main" }
logo-9          = { type = "show-workspace", name = "9", output.name = "main" }

logo-shift-1    = [ { type = "move-to-workspace", name = "1"}, { type = "show-workspace", name = "1" } ]
logo-shift-2    = [ { type = "move-to-workspace", name = "2"}, { type = "show-workspace", name = "2" } ]
logo-shift-3    = [ { type = "move-to-workspace", name = "3"}, { type = "show-workspace", name = "3" } ]
logo-shift-4    = [ { type = "move-to-workspace", name = "4"}, { type = "show-workspace", name = "4" } ]
logo-shift-5    = [ { type = "move-to-workspace", name = "5"}, { type = "show-workspace", name = "5" } ]
logo-shift-6    = [ { type = "move-to-workspace", name = "6"}, { type = "show-workspace", name = "6" } ]
logo-shift-7    = [ { type = "move-to-workspace", name = "7"}, { type = "show-workspace", name = "7" } ]
logo-shift-8    = [ { type = "move-to-workspace", name = "8"}, { type = "show-workspace", name = "8" } ]
logo-shift-9    = [ { type = "move-to-workspace", name = "9"}, { type = "show-workspace", name = "9" } ]

## Window

logo-shift-f    = "toggle-fullscreen"
logo-f          = "toggle-floating"
logo-q          = "close"

logo-h          = "focus-left"
logo-j          = "focus-down"
logo-k          = "focus-up"
logo-l          = "focus-right"
logo-Left       = "focus-left"
logo-Down       = "focus-down"
logo-Up         = "focus-up"
logo-Right      = "focus-right"

logo-shift-h    = "move-left"
logo-shift-j    = "move-down"
logo-shift-k    = "move-up"
logo-shift-l    = "move-right"
logo-shift-Left = "move-left"
logo-shift-Down = "move-down"
logo-shift-Up   = "move-up"
logo-shift-Right= "move-right"

## Applications

logo-space     = { type = "exec", exec = "kitty" }
logo-e          = { type = "exec", exec = "thunar" }
logo-d          = { type = "exec", exec = ["rofi", "-show", "drun"]}
logo-x          = { type = "exec", exec = ["rofi", "-show", "window"]}
logo-b          = { type = "exec", exec = "firefox" }
logo-p          = { type = "exec", exec = "prismlauncher" }
logo-shift-p    = { type = "exec", exec = "wlogout" }

## Misc

logo-o          = { type = "exec", exec = "hyprlock" }
logo-m          = "quit"
logo-shift-s    = { type = "exec", exec = { prog = "bash", args = [ "-lc", 'grim -g "$(slurp -d)" - | swappy -f - -o - | wl-copy' ], privileged = true } }
logo-r          = "reload-config-toml"

logo-c          = "open-control-center" 

XF86AudioRaiseVolume  = { type = "exec", exec = ["wpctl", "set-volume", "@DEFAULT_AUDIO_SINK@", "0.05+"] }
XF86AudioLowerVolume  = { type = "exec", exec = ["wpctl", "set-volume", "@DEFAULT_AUDIO_SINK@", "0.05-"] }
XF86AudioMute         = { type = "exec", exec = ["wpctl", "set-mute", "@DEFAULT_AUDIO_SINK@", "toggle"] }
XF86MonBrightnessUp   = { type = "exec", exec = ["brightnessctl", "s", "5%+"] }
XF86MonBrightnessDown = { type = "exec", exec = ["brightnessctl", "s", "5%-"] }
XF86AudioPlay         = { type = "exec", exec = ["playerctl", "play-pause"] }
XF86AudioNext         = { type = "exec", exec = ["playerctl", "next"] }
XF86AudioPrev         = { type = "exec", exec = ["playerctl", "previous"] }

### DECORATIONS ###

[theme]
border-width = 3
border-color = "#a7c080"

show-bar = false

bg-color = "#272e33"
focused-title-bg-color = "#145e0b"
focused-title-text-color = "#EEEEEE"
unfocused-title-bg-color = "#000000"
unfocused-title-text-color = "#999999"
focused-inactive-title-bg-color = "#250015"
focused-inactive-title-text-color = "#999999"


### STARTUP ###

on-startup = [
	{ type = "exec", exec = "gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'" },
	{ type = "exec", exec = "gsettings set org.gnome.desktop.interface gtk-theme 'Adwaita-dark'" },
]

on-graphics-initialized = [
	{ type = "exec", exec = ["jay", "input", "seat", "default", "set-cursor-size", "32"] },
	{ type = "push-mode", name = "default" },
  { type = "exec", exec = "mako" },
  { type = "exec", exec = "waybar" },
]

### KEYMAPS ###

keymap.rmlvo = { layout = "us" }
