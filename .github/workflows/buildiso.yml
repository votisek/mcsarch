name: Build ISO

on:
  push:
    branches: [ "main" ]
    paths: ["mcsarch/**", ".github/workflows/buildiso.yml"]
  pull_request:
    branches: [ "main" ]
    paths: [ "mcsarch/**" ]

jobs:
  build:

    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm archiso make which

      - name: Build ISO
        run: make build

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcsarch-iso
          path: out/*.iso
          retention-days: 5
